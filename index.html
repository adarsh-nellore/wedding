<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>K + A · CDMX 2027</title>
    <meta name="description" content="Meet us in Mexico City. February 19 to 21, 2027." />
    <meta name="theme-color" content="#0E0E0E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
    />
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <audio id="music" preload="auto" loop>
      <source src="assets/cerca-de-ti.m4a" type="audio/mp4" />
      <source src="assets/cerca-de-ti.mp3" type="audio/mpeg" />
    </audio>

    <div class="controls" id="controls">
      <button class="ctrl" id="prev" type="button" aria-label="Previous scene">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 5 L7 12 L15 19" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="ctrl" id="control" type="button" aria-label="Pause" data-state="playing">
        <svg class="icon icon-pause" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="7" y="5" width="3" height="14" rx="0.5" />
          <rect x="14" y="5" width="3" height="14" rx="0.5" />
        </svg>
        <svg class="icon icon-play" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 5 L19 12 L7 19 Z" />
        </svg>
      </button>
      <button class="ctrl" id="next" type="button" aria-label="Next scene">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 5 L17 12 L9 19" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <main class="stage">
      <!-- 1 — Hero -->
      <section class="scene scene--hero" id="s1">
        <div class="scene-grid scene-grid--right-photo">
          <div class="copy copy--left-mid">
            <p class="line" data-line="meet"></p>
          </div>
          <figure class="photo photo--portrait" data-photo="hero">
            <img
              src="assets/2C00FF18-B7B0-4F0D-8970-70172557C854.jpg"
              alt=""
              loading="eager"
              decoding="async"
            />
          </figure>
        </div>
      </section>

      <!-- 2 — Amor -->
      <section class="scene scene--amor" id="s2">
        <figure class="photo photo--full" data-photo="amor">
          <img
            src="assets/095F6499-72FA-4D0C-A7DA-15443980E794.jpg"
            alt=""
            loading="lazy"
            decoding="async"
          />
        </figure>
        <div class="copy copy--bottom-right">
          <p class="line" data-line="amor"><span class="line-lead"></span><span class="amor-fade"> <em>amor</em> <span class="heart">♥</span></span></p>
        </div>
      </section>

      <!-- 3 — Dates -->
      <section class="scene scene--dates" id="s3">
        <div class="scene-grid scene-grid--right-photo">
          <div class="copy copy--left-mid stack">
            <p class="line" data-line="d-date"></p>
            <p class="line" data-line="d-fri"></p>
            <p class="line" data-line="d-sat"></p>
            <p class="line" data-line="d-sun"></p>
          </div>
          <figure class="photo photo--portrait" data-photo="dates">
            <img
              src="assets/IMG_6207.jpeg"
              alt=""
              loading="lazy"
              decoding="async"
            />
          </figure>
        </div>
      </section>

      <!-- 4 — Why -->
      <section class="scene scene--why" id="s4">
        <div class="scene-grid scene-grid--right-photo">
          <div class="copy copy--left-mid stack">
            <p class="line" data-line="why-q"></p>
            <div class="line-gap" aria-hidden="true"></div>
            <p class="line" data-line="why-1"></p>
            <p class="line" data-line="why-2"></p>
            <p class="line" data-line="why-3"></p>
            <div class="line-gap" aria-hidden="true"></div>
            <p class="line" data-line="why-4"></p>
            <div class="line-gap" aria-hidden="true"></div>
            <p class="line" data-line="why-5"></p>
          </div>
          <figure class="photo photo--portrait" data-photo="why">
            <img
              src="assets/BACC20B3-3A36-4547-9E79-38A7D35BBBCD.jpg"
              alt=""
              loading="lazy"
              decoding="async"
            />
          </figure>
        </div>
      </section>

      <!-- 6 — Form -->
      <section class="scene scene--form" id="s6">
        <div class="scene-grid scene-grid--right-photo">
          <div class="copy copy--left-top stack">
            <p class="line" data-line="form-q"></p>

            <form class="rsvp" id="rsvp" novalidate>
              <label class="field">
                <span>Name</span>
                <input type="text" name="name" autocomplete="name" required />
              </label>
              <label class="field">
                <span>Email</span>
                <input type="email" name="email" autocomplete="email" required />
              </label>
              <label class="field">
                <span>Phone</span>
                <input type="tel" name="phone" autocomplete="tel" />
              </label>
              <label class="field">
                <span>Mailing address</span>
                <input type="text" name="address" autocomplete="street-address" />
              </label>
              <div class="actions">
                <button type="submit" data-action="yes">Yes, please.</button>
                <button type="submit" data-action="no">No, but save my info.</button>
              </div>
            </form>
          </div>
          <figure class="photo photo--portrait" data-photo="form">
            <img
              src="assets/9037C69B-EF10-4D41-8F8D-4C4F28CCAF87.jpg"
              alt=""
              loading="lazy"
              decoding="async"
            />
          </figure>
        </div>
      </section>

      <!-- 7 — Thank you -->
      <section class="scene scene--thanks" id="s7">
        <div class="scene-grid scene-grid--right-photo">
          <div class="copy copy--left-mid stack">
            <p class="line" data-line="t-1"></p>
            <p class="line" data-line="t-2"></p>
            <p class="line" data-line="t-3"></p>
            <p class="line" data-line="t-4"></p>
            <p class="line" data-line="t-5"></p>
          </div>
          <figure class="photo photo--portrait" data-photo="thanks">
            <img
              src="assets/amor.jpg"
              alt=""
              loading="lazy"
              decoding="async"
            />
          </figure>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
