<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>K + A · CDMX 2027</title>
    <meta name="description" content="Meet us in Mexico City. February 19 to 21, 2027." />
    <meta name="theme-color" content="#0E0E0E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
    />
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <audio id="music" preload="auto" loop>
      <source src="assets/cerca-de-ti.m4a" type="audio/mp4" />
      <source src="assets/cerca-de-ti.mp3" type="audio/mpeg" />
    </audio>

    <main class="stage">
      <!-- 1 — Hero -->
      <section class="scene scene--hero" id="s1">
        <div class="scene-grid scene-grid--right-photo">
          <div class="copy copy--left-mid">
            <p class="line" data-line="meet"></p>
          </div>
          <figure class="photo photo--portrait" data-photo="hero">
            <img
              src="assets/095F6499-72FA-4D0C-A7DA-15443980E794.jpg"
              alt=""
              loading="eager"
              decoding="async"
            />
          </figure>
        </div>
      </section>

      <!-- 2 — Amor -->
      <section class="scene scene--amor" id="s2">
        <figure class="photo photo--bleed" data-photo="amor">
          <img
            src="assets/BACC20B3-3A36-4547-9E79-38A7D35BBBCD.jpg"
            alt=""
            loading="lazy"
            decoding="async"
          />
        </figure>
        <div class="copy copy--bottom-right">
          <p class="line" data-line="amor"></p>
        </div>
      </section>

      <!-- 3 — Dates -->
      <section class="scene scene--dates" id="s3">
        <div class="copy copy--left-mid stack">
          <p class="line" data-line="d-date"></p>
          <p class="line" data-line="d-fri"></p>
          <p class="line" data-line="d-sat"></p>
          <p class="line" data-line="d-sun"></p>
        </div>
      </section>

      <!-- 4 — Why -->
      <section class="scene scene--why" id="s4">
        <div class="scene-grid scene-grid--right-photo">
          <div class="copy copy--left-mid stack">
            <p class="line" data-line="why-q"></p>
            <p class="line" data-line="why-1"></p>
            <p class="line" data-line="why-2"></p>
            <p class="line" data-line="why-3"></p>
            <p class="line" data-line="why-4"></p>
          </div>
          <figure class="photo photo--portrait" data-photo="why">
            <img
              src="assets/2C00FF18-B7B0-4F0D-8970-70172557C854.jpg"
              alt=""
              loading="lazy"
              decoding="async"
            />
          </figure>
        </div>
      </section>

      <!-- 5 — Invite teaser -->
      <section class="scene scene--invite" id="s5">
        <div class="copy copy--center stack">
          <figure class="photo photo--wide" data-photo="invite">
            <img
              src="assets/7BF617C4-EB50-422C-9FFA-4AE1C12B433F.jpg"
              alt=""
              loading="lazy"
              decoding="async"
            />
          </figure>
          <p class="line line--center" data-line="invite"></p>
        </div>
      </section>

      <!-- 6 — Form -->
      <section class="scene scene--form" id="s6">
        <div class="scene-grid scene-grid--right-photo">
          <div class="copy copy--left-top stack">
            <p class="line" data-line="form-q"></p>

            <form class="rsvp" id="rsvp" novalidate>
              <label class="field">
                <span>Name</span>
                <input type="text" name="name" autocomplete="name" required />
              </label>
              <label class="field">
                <span>Email</span>
                <input type="email" name="email" autocomplete="email" required />
              </label>
              <label class="field">
                <span>Phone</span>
                <input type="tel" name="phone" autocomplete="tel" />
              </label>
              <label class="field">
                <span>Mailing address</span>
                <input type="text" name="address" autocomplete="street-address" />
              </label>
              <div class="actions">
                <button type="submit" data-action="yes">Yes, please.</button>
                <button type="submit" data-action="no">No, but save my info.</button>
              </div>
            </form>
          </div>
          <figure class="photo photo--portrait" data-photo="form">
            <img
              src="assets/9037C69B-EF10-4D41-8F8D-4C4F28CCAF87.jpg"
              alt=""
              loading="lazy"
              decoding="async"
            />
          </figure>
        </div>
      </section>

      <!-- 7 — Thank you -->
      <section class="scene scene--thanks" id="s7">
        <div class="copy copy--left-mid stack">
          <p class="line" data-line="t-1"></p>
          <p class="line" data-line="t-2"></p>
          <p class="line" data-line="t-3"></p>
          <p class="line" data-line="t-4"></p>
          <p class="line" data-line="t-5"></p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
